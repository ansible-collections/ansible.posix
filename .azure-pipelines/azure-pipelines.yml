---
trigger:
  batch: true
  branches:
    include:
      - main
      - stable-*

pr:
  autoCancel: true
  branches:
    include:
      - main
      - stable-*

schedules:
  - cron: "0 9 * * *"
    displayName: Nightly
    always: true
    branches:
      include:
        - main
        - stable-*

variables:
  - name: checkoutPath
    value: ansible_collections/ansible/posix
  - name: coverageBranches
    value: main
  - name: pipelinesCoverage
    value: coverage
  - name: entryPoint
    value: tests/utils/shippable/shippable.sh
  - name: fetchDepth
    value: 0

resources:
  containers:
    - container: default
      image: quay.io/ansible/azure-pipelines-test-container:7.0.0

pool: Standard

stages:
  - stage: Sanity_devel
    displayName: Ansible devel Sanity & Units & Lint
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          nameFormat: "{0}"
          testFormat: devel/{0}
          targets:
            - name: Sanity
              test: sanity
            - name: Units
              test: units
            - name: Lint
              test: lint

  - stage: Sanity_2_21
    displayName: Ansible 2.21 Sanity & Units & Lint
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          nameFormat: "{0}"
          testFormat: 2.21/{0}
          targets:
            - name: Sanity
              test: sanity
            - name: Units
              test: units
            - name: Lint
              test: lint

  - stage: Sanity_2_20
    displayName: Ansible 2.20 Sanity & Units & Lint
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          nameFormat: "{0}"
          testFormat: 2.20/{0}
          targets:
            - name: Sanity
              test: sanity
            - name: Units
              test: units
            - name: Lint
              test: lint

  - stage: Sanity_2_19
    displayName: Ansible 2.19 Sanity & Units & Lint
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          nameFormat: "{0}"
          testFormat: 2.19/{0}
          targets:
            - name: Sanity
              test: sanity
            - name: Units
              test: units
            - name: Lint
              test: lint

  - stage: Sanity_2_18_LTS
    displayName: Ansible 2.18 LTS Sanity & Units & Lint
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          nameFormat: "{0}"
          testFormat: 2.18/{0}
          targets:
            - name: Sanity
              test: sanity
            - name: Units
              test: units
            - name: Lint
              test: lint

  # 2.16 is LTS, skipping 2.17 as it is EOL
  - stage: Sanity_2_16_LTS
    displayName: Ansible 2.16 LTS Sanity & Units & Lint
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          nameFormat: "{0}"
          testFormat: 2.16/{0}
          targets:
            - name: Sanity
              test: sanity
            - name: Units
              test: units
            - name: Lint
              test: lint

  ## Docker
  - stage: Docker_devel
    displayName: Docker devel
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: devel/linux/{0}/1
          targets:
            - name: Fedora 44
              test: fedora44
            - name: Ubuntu 22.04
              test: ubuntu2204
            - name: Ubuntu 24.04
              test: ubuntu2404

  - stage: Docker_2_21
    displayName: Docker 2.21
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: devel/linux/{0}/1
          targets:
            - name: Fedora 44
              test: fedora44
            - name: Ubuntu 22.04
              test: ubuntu2204
            - name: Ubuntu 24.04
              test: ubuntu2404

  - stage: Docker_2_20
    displayName: Docker 2.20
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.20/linux/{0}/1
          targets:
            - name: Fedora 42
              test: fedora42
            - name: Ubuntu 22.04
              test: ubuntu2204
            - name: Ubuntu 24.04
              test: ubuntu2404

  - stage: Docker_2_19
    displayName: Docker 2.19
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.19/linux/{0}/1
          targets:
            - name: Fedora 41
              test: fedora41
            - name: Ubuntu 22.04
              test: ubuntu2204
            - name: Ubuntu 24.04
              test: ubuntu2404

  - stage: Docker_2_18_LTS
    displayName: Docker 2.18 LTS
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.18/linux/{0}/1
          targets:
            - name: Fedora 40
              test: fedora40
            - name: Ubuntu 22.04
              test: ubuntu2204
            - name: Ubuntu 24.04
              test: ubuntu2404

  - stage: Docker_2_16_LTS
    displayName: Docker 2.16 LTS
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.16/linux/{0}/1
          targets:
            - name: CentOS 7
              test: centos7
            - name: Ubuntu 20.04
              test: ubuntu2004

  ## Remote
  - stage: Remote_devel
    displayName: Remote devel
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: devel/{0}/1
          targets:
            - name: RHEL 10.1
              test: rhel/10.1
            - name: RHEL 9.7
              test: rhel/9.7
            - name: FreeBSD 14.4
              test: freebsd/14.4
            - name: FreeBSD 15.0
              test: freebsd/15.0

  - stage: Remote_2_21
    displayName: Remote 2.21
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: devel/{0}/1
          targets:
            - name: RHEL 10.1
              test: rhel/10.1
            - name: RHEL 9.7
              test: rhel/9.7
            - name: FreeBSD 14.4
              test: freebsd/14.4
            - name: FreeBSD 15.0
              test: freebsd/15.0

  - stage: Remote_2_20
    displayName: Remote 2.20
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.20/{0}/1
          targets:
            - name: RHEL 10.1
              test: rhel/10.1
            - name: RHEL 9.7
              test: rhel/9.7
            - name: FreeBSD 14.3
              test: freebsd/14.3
            - name: FreeBSD 13.5
              test: freebsd/13.5

  - stage: Remote_2_19
    displayName: Remote 2.19
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.19/{0}/1
          targets:
            - name: RHEL 10.1
              test: rhel/10.1
            - name: RHEL 9.7
              test: rhel/9.7
            - name: FreeBSD 14.2
              test: freebsd/14.2
            - name: FreeBSD 13.5
              test: freebsd/13.5

  - stage: Remote_2_18_LTS
    displayName: Remote 2.18 LTS
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.18/{0}/1
          targets:
            - name: RHEL 10.1
              test: rhel/10.1
            - name: RHEL 9.7
              test: rhel/9.7
            - name: FreeBSD 13.5
              test: freebsd/13.5

  - stage: Remote_2_16_LTS
    displayName: Remote 2.16 LTS
    dependsOn: []
    jobs:
      - template: templates/matrix.yml
        parameters:
          testFormat: 2.16/{0}/1
          targets:
            - name: RHEL 9.7
              test: rhel/9.7
            - name: RHEL 10.1
              test: rhel/10.1

  ## Finally
  - stage: Summary
    condition: succeededOrFailed()
    dependsOn:
      - Sanity_2_16_LTS
      - Remote_2_16_LTS
      - Docker_2_16_LTS
      - Sanity_2_18_LTS
      - Remote_2_18_LTS
      - Docker_2_18_LTS
      - Sanity_2_19
      - Remote_2_19
      - Docker_2_19
      - Sanity_2_20
      - Remote_2_20
      - Docker_2_20
      - Sanity_2_21
      - Remote_2_21
      - Docker_2_21
      - Sanity_devel
      - Remote_devel
      - Docker_devel
    jobs:
      - template: templates/coverage.yml
